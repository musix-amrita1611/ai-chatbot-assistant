<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RAG AI Chatbot — Infinite Memory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Main UI Container -->
<div class="space-environment">

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="new-chat-btn">✚ NEW MISSION</button>
    <!-- Memory Badge -->
    <div id="memory-badge">
      <span id="mem-count">0</span> memories · <span id="session-count">0</span> sessions
    </div>
    <div id="session-list"><!-- Previous chats injected here --></div>

    <!-- Feedback Panel -->
    <div id="feedback-panel">
      <div class="feedback-title">⚡ TEACH THE AI</div>
      <input id="feedback-q" placeholder="Wrong question...">
      <input id="feedback-a" placeholder="Correct answer...">
      <button id="feedback-btn">SUBMIT CORRECTION</button>
    </div>
  </div>

  <!-- Space Backgrounds -->
  <div class="starfield-slow"></div>
  <div class="starfield-fast"></div>
  <div class="milkyway"></div>
  <div class="nebula"></div>

  <!-- Solar System Graphic -->
  <div class="solar-system">
    <div class="sun"></div>
    <div class="orbit mercury-orbit"><div class="planet mercury"></div></div>
    <div class="orbit venus-orbit"><div class="planet venus"></div></div>
    <div class="orbit earth-orbit">
      <div class="planet earth">
        <div class="moon-orbit"><div class="moon"></div></div>
      </div>
    </div>
    <div class="orbit mars-orbit"><div class="planet mars"></div></div>
    <div class="orbit jupiter-orbit"><div class="planet jupiter"></div></div>
    <div class="orbit saturn-orbit">
      <div class="planet saturn"><div class="ring"></div></div>
    </div>
    <div class="orbit uranus-orbit"><div class="planet uranus"></div></div>
    <div class="orbit neptune-orbit"><div class="planet neptune"></div></div>
  </div>

  <!-- System Status -->
  <div id="ai-status">
    <span id="status-text">SYSTEM READY</span>
    <div class="pulse-container">
      <div class="pulse-bar"></div>
      <div class="pulse-bar"></div>
      <div class="pulse-bar"></div>
    </div>
    <!-- RAG indicators -->
    <div id="rag-indicators">
      <span class="rag-tag" id="tag-memory" style="display:none">🧠 MEM</span>
      <span class="rag-tag" id="tag-knowledge" style="display:none">📚 RAG</span>
    </div>
  </div>

  <!-- Chat Box -->
  <div id="chat-box"></div>

  <div class="transmit-area">
    <input type="text" id="user-input" placeholder="Type your transmission..." autocomplete="off">
    <button id="send-btn">TRANSMIT</button>
  </div>

  <!-- Clock -->
  <div class="digital-clock">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">LOADING DATE...</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
